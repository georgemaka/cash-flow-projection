name: Issue PR Sync

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  sync-linked-issues:
    name: Sync linked issue labels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Update linked issue labels from PR state
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const regex = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?|related to)\s+#(\d+)/gi;
            const linked = new Set();
            let match;
            while ((match = regex.exec(body)) !== null) {
              linked.add(Number(match[1]));
            }

            if (linked.size === 0) {
              core.info('No linked issues found in PR body.');
              return;
            }

            const { owner, repo } = context.repo;
            const event = context.payload.action;
            const merged = Boolean(context.payload.pull_request.merged);
            const requiredLabels = [
              { name: 'in-review', color: 'FBCA04', description: 'Issue has an open PR under review' },
              { name: 'ready-for-pr', color: '0E8A16', description: 'Ready for implementation PR' },
              { name: 'needs-review', color: 'D4C5F9', description: 'Implementation done and awaiting review' },
              { name: 'review-blocked', color: 'B60205', description: 'Blocked by review findings or policy checks' },
              { name: 'done', color: '1D76DB', description: 'Merged and complete' }
            ];

            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw error;
                }
              }
            }

            for (const issue_number of linked) {
              if (event === 'closed') {
                if (merged) {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number,
                    labels: ['done']
                  });

                  for (const label of ['in-review', 'needs-review', 'review-blocked', 'ready-for-pr']) {
                    try {
                      await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
                    } catch (error) {
                      if (error.status !== 404) throw error;
                    }
                  }
                } else {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number,
                    labels: ['ready-for-pr']
                  });

                  try {
                    await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'in-review' });
                  } catch (error) {
                    if (error.status !== 404) throw error;
                  }
                }
              } else {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['in-review']
                });

                for (const label of ['ready-for-pr', 'needs-review']) {
                  try {
                    await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
                  } catch (error) {
                    if (error.status !== 404) throw error;
                  }
                }
              }
            }
